{% extends 'mi_app/base.html' %}

{% block content %}

<div class="card p-4 shadow-sm">

    <h2 class="mb-3">Editar Perfil</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="mt-3">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{% url 'accounts:perfil' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

    <hr>

    <a href="{% url 'password_change' %}" class="btn btn-warning mt-2">
        Cambiar contraseña
    </a>

</div>

{% endblock %}
