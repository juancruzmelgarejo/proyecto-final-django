<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Blog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  
<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="{% url 'mi_app:home' %}">
        MiBlog
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- IZQUIERDA -->
      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link" href="{% url 'mi_app:home' %}">Inicio</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'mi_app:inicio' %}">Blog</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'mi_app:about' %}">About</a>
        </li>

        {% if user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'mi_app:crear_post' %}">Crear Post</a>
        </li>

        <!-- 🔥 BOTÓN MENSAJES (CORRECTO) -->
        <li class="nav-item">
          <a class="nav-link" href="{% url 'mensajes:inbox' %}">
            Mensajes
          </a>
        </li>
        {% endif %}

      </ul>

      <!-- 🔍 BUSCADOR -->
      <form class="d-flex me-3" action="{% url 'mi_app:buscar' %}" method="GET">
        <input class="form-control me-2" type="search" name="q" placeholder="Buscar..." aria-label="Buscar">
        <button class="btn btn-outline-light" type="submit">Buscar</button>
      </form>

      <!-- DERECHA -->
      <ul class="navbar-nav">

        {% if user.is_authenticated %}

          <li class="nav-item">
            <a class="nav-link" href="{% url 'accounts:perfil' %}">
              {{ user.username }}
            </a>
          </li>

          <li class="nav-item">
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button class="btn btn-danger btn-sm ms-2">Logout</button>
            </form>
          </li>

        {% else %}

          <li class="nav-item">
            <a class="nav-link" href="{% url 'login' %}">Login</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'accounts:signup' %}">Signup</a>
          </li>

        {% endif %}

      </ul>

    </div>
  </div>
</nav>


<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
